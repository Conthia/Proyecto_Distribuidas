server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://mysql-producto:3306/db_producto?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://registry-server:7081/eureka/
  instance:
    prefer-ip-address: true