server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3381/db_producto?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka/
  instance:
    prefer-ip-address: true